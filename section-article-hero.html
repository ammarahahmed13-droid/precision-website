<!-- ============================================================
     PRECISION — Article Hero (Bricks Code Block)
     Reusable per article. Edit: category slug/label/color,
     title, read time, date, and share URL.
     ============================================================ -->

<style>
.art-hero *,
.art-hero *::before,
.art-hero *::after { margin: 0; padding: 0; box-sizing: border-box; }

.art-hero {
  background: #0B0B1E;
  padding: 72px 24px 64px;
  font-family: 'Inter', sans-serif;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.art-hero-inner {
  max-width: 896px;
  margin: 0 auto;
  padding: 0 16px;
}

/* ── Back link ───────────────────────────────────────────── */
.art-back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: #99A1AF;
  text-decoration: none;
  margin-bottom: 28px;
  transition: color 0.18s;
}
.art-back-link:hover { color: #FFFFFF; }
.art-back-link svg { flex-shrink: 0; }

/* ── Category tag ─────────────────────────────────────────── */
.art-cat-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 24px;
  font-family: 'Inter', sans-serif;
}
/* Category colour variants — add more as needed */
.art-cat-tag--cro              { background: rgba(0,191,255,0.10);  border: 1px solid rgba(0,191,255,0.20);  color: #00BFFF; }
.art-cat-tag--e-commerce       { background: rgba(167,139,250,0.10); border: 1px solid rgba(167,139,250,0.20); color: #A78BFA; }
.art-cat-tag--aov              { background: rgba(252,211,77,0.10);  border: 1px solid rgba(252,211,77,0.20);  color: #FCD34D; }
.art-cat-tag--ui-ux            { background: rgba(244,114,182,0.10); border: 1px solid rgba(244,114,182,0.20); color: #F472B6; }
.art-cat-tag--product-psychology { background: rgba(192,132,252,0.10); border: 1px solid rgba(192,132,252,0.20); color: #C084FC; }
.art-cat-tag--experimentation  { background: rgba(74,222,128,0.10);  border: 1px solid rgba(74,222,128,0.20);  color: #4ADE80; }

/* ── H1 ───────────────────────────────────────────────────── */
.art-hero-title {
  font-size: 54px;
  font-weight: 700;
  color: #FFFFFF !important;
  -webkit-text-fill-color: #FFFFFF !important;
  line-height: 1.15;
  letter-spacing: -0.03em;
  margin-bottom: 32px;
  font-family: 'Inter', sans-serif;
}

/* ── Meta row ─────────────────────────────────────────────── */
.art-meta {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 24px;
}
.art-meta-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: #99A1AF;
}
.art-meta-item svg { color: #6B7280; flex-shrink: 0; }
.art-meta-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: #374151;
}

/* ── Share button ─────────────────────────────────────────── */
.art-share-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 50px;
  font-size: 14px;
  font-weight: 500;
  color: #FFFFFF;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.18s, border-color 0.18s;
}
.art-share-btn:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.18);
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 767px) {
  .art-hero { padding: 52px 16px 48px; }
  .art-hero-title { font-size: 32px; }
  .art-meta { flex-wrap: wrap; gap: 12px; }
}
@media (min-width: 1024px) {
  .art-hero-title { font-size: 60px; }
}
</style>

<section class="art-hero" aria-labelledby="art-title">
  <div class="art-hero-inner">

    <a href="/insights" class="art-back-link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to Blog
    </a>

    <!-- ↓ Change class to art-cat-tag--[slug] and label to match -->
    <div>
      <span class="art-cat-tag art-cat-tag--e-commerce">
        <svg width="12" height="12" viewBox="0 0 10 10" fill="none" aria-hidden="true">
          <path d="M1.5 2.5h7l-1 4H2.5l-1-4Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          <circle cx="3.5" cy="8" r="0.8" fill="currentColor"/>
          <circle cx="7" cy="8" r="0.8" fill="currentColor"/>
        </svg>
        E-Commerce
      </span>
    </div>

    <!-- ↓ Edit title per article -->
    <h1 class="art-hero-title" id="art-title">Why Your E-Commerce Store Gets Traffic But No Sales (And How to Fix It)</h1>

    <!-- ↓ Edit read time and date per article -->
    <div class="art-meta">
      <span class="art-meta-item">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.4"/>
          <path d="M7 4v3l2 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        10 min read
      </span>
      <span class="art-meta-dot" aria-hidden="true"></span>
      <span class="art-meta-item">March 10, 2026</span>
    </div>

    <button class="art-share-btn"
            onclick="if(navigator.share){navigator.share({title:document.title,url:location.href})}else{navigator.clipboard&&navigator.clipboard.writeText(location.href)}"
            type="button"
            aria-label="Share this article">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <circle cx="11" cy="3" r="1.5" stroke="currentColor" stroke-width="1.4"/>
        <circle cx="3"  cy="7" r="1.5" stroke="currentColor" stroke-width="1.4"/>
        <circle cx="11" cy="11" r="1.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M4.5 6.2l5-2.7M4.5 7.8l5 2.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Share
    </button>

  </div>
</section>
