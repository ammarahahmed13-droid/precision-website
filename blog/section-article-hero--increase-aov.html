<script>
(function () {
  var wrap = document.querySelector('.art-share-wrap');
  if (!wrap) return;
  var btn = wrap.querySelector('.art-share-btn');
  var dropdown = wrap.querySelector('.art-share-dropdown');
  var copyLabel = wrap.querySelector('[data-copy-label]');

  btn.addEventListener('click', function () {
    var open = dropdown.classList.toggle('art-share-dropdown--open');
    btn.setAttribute('aria-expanded', open);
  });

  document.addEventListener('click', function (e) {
    if (!wrap.contains(e.target)) {
      dropdown.classList.remove('art-share-dropdown--open');
      btn.setAttribute('aria-expanded', 'false');
    }
  });

  wrap.addEventListener('click', function (e) {
    var opt = e.target.closest('[data-share]');
    if (!opt) return;
    var type = opt.dataset.share;
    var url = encodeURIComponent(location.href);
    var title = encodeURIComponent(document.title);

    var articleTitle = document.getElementById('art-title') ? document.getElementById('art-title').textContent : document.title;

    if (type === 'linkedin') {
      window.open('https://www.linkedin.com/sharing/share-offsite/?url=' + url, '_blank', 'width=600,height=500');
    } else if (type === 'x') {
      window.open('https://x.com/intent/tweet?url=' + url + '&text=' + title, '_blank', 'width=600,height=500');
    } else if (type === 'whatsapp') {
      window.open('https://wa.me/?text=' + title + '%20' + url, '_blank', 'width=600,height=500');
    } else if (type === 'instagram') {
      var igLabel = wrap.querySelector('[data-ig-label]');
      navigator.clipboard.writeText(location.href).then(function () {
        igLabel.textContent = 'Link copied for Instagram!';
        setTimeout(function () { igLabel.textContent = 'Share on Instagram'; }, 3000);
      });
    } else if (type === 'copy') {
      navigator.clipboard.writeText(location.href).then(function () {
        copyLabel.textContent = 'Copied!';
        setTimeout(function () { copyLabel.textContent = 'Copy link'; }, 2000);
      });
    }

    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      event: 'article_share_click',
      share_platform: type,
      article_title: articleTitle,
      page_path: location.pathname
    });

    if (type === 'instagram' || type === 'copy') return;
    dropdown.classList.remove('art-share-dropdown--open');
    btn.setAttribute('aria-expanded', 'false');
  });
})();
</script>
